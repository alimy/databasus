services:
  # ================================================================
  # Local image build (opt-in via profile)
  # ================================================================

  # For local development only to test build. This service is gated
  # behind the "image" profile so it does NOT start with a plain
  # `docker compose up -d`. To run: docker compose up databasus-local
  databasus-local:
    profiles: ["image"]
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4005:4005"
    volumes:
      - ./databasus-data:/databasus-data
    container_name: databasus-local
    restart: unless-stopped

  # ================================================================
  # Backend dev services
  # ================================================================

  # For development only, because this DB
  # exposes its port to the public
  backend-db:
    image: postgres:17
    ports:
      - "${BACKEND_DB_PORT:-5437}:5432"
    environment:
      - POSTGRES_DB=${DEV_DB_NAME}
      - POSTGRES_USER=${DEV_DB_USERNAME}
      - POSTGRES_PASSWORD=${DEV_DB_PASSWORD}
    volumes:
      - /var/lib/postgresql/data
    container_name: backend-db
    shm_size: 10gb

  # Dedicated test DB so `make test` doesn't pollute the dev DB
  backend-db-test:
    image: postgres:17
    ports:
      - "${BACKEND_DB_TEST_PORT:-5438}:5432"
    environment:
      - POSTGRES_DB=${DEV_DB_NAME}
      - POSTGRES_USER=${DEV_DB_USERNAME}
      - POSTGRES_PASSWORD=${DEV_DB_PASSWORD}
    volumes:
      - /var/lib/postgresql/data
    container_name: backend-db-test
    shm_size: 10gb

  # Valkey for caching
  backend-valkey:
    image: valkey/valkey:9.0.1-alpine
    ports:
      - "${VALKEY_PORT}:6379"
    volumes:
      - /data
    container_name: backend-valkey
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # VictoriaLogs for external logging
  backend-victoria-logs:
    image: victoriametrics/victoria-logs:latest
    container_name: backend-victoria-logs
    ports:
      - "${BACKEND_VICTORIA_LOGS_PORT:-9428}:9428"
    command:
      - -storageDataPath=/victoria-logs-data
      - -retentionPeriod=7d
      - -httpAuth.password=devpassword
    volumes:
      - /victoria-logs-data
    restart: unless-stopped

  # ================================================================
  # Test containers
  # ================================================================

  # Test MinIO container
  test-minio:
    image: minio/minio:latest
    ports:
      - "${TEST_MINIO_PORT}:9000"
      - "${TEST_MINIO_CONSOLE_PORT}:9001"
    environment:
      - MINIO_ROOT_USER=testuser
      - MINIO_ROOT_PASSWORD=testpassword
    container_name: test-minio
    command: server /data --console-address ":9001"

  # Test PostgreSQL containers
  test-logical-postgres-12:
    image: postgres:12
    ports:
      - "${TEST_LOGICAL_POSTGRES_12_PORT}:5432"
    environment:
      - POSTGRES_DB=testdb
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
    container_name: test-logical-postgres-12
    shm_size: 1gb

  test-logical-postgres-13:
    image: postgres:13
    ports:
      - "${TEST_LOGICAL_POSTGRES_13_PORT}:5432"
    environment:
      - POSTGRES_DB=testdb
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
    container_name: test-logical-postgres-13
    shm_size: 1gb

  test-logical-postgres-14:
    image: postgres:14
    ports:
      - "${TEST_LOGICAL_POSTGRES_14_PORT}:5432"
    environment:
      - POSTGRES_DB=testdb
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
    container_name: test-logical-postgres-14
    shm_size: 1gb

  test-logical-postgres-15:
    image: postgres:15
    ports:
      - "${TEST_LOGICAL_POSTGRES_15_PORT}:5432"
    environment:
      - POSTGRES_DB=testdb
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
    container_name: test-logical-postgres-15
    shm_size: 1gb

  test-logical-postgres-16:
    image: postgres:16
    ports:
      - "${TEST_LOGICAL_POSTGRES_16_PORT}:5432"
    environment:
      - POSTGRES_DB=testdb
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
    container_name: test-logical-postgres-16
    shm_size: 1gb

  test-logical-postgres-17:
    image: postgres:17
    ports:
      - "${TEST_LOGICAL_POSTGRES_17_PORT}:5432"
    environment:
      - POSTGRES_DB=testdb
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
    container_name: test-logical-postgres-17
    shm_size: 1gb

  test-logical-postgres-18:
    image: postgres:18
    ports:
      - "${TEST_LOGICAL_POSTGRES_18_PORT}:5432"
    environment:
      - POSTGRES_DB=testdb
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
    container_name: test-logical-postgres-18
    shm_size: 1gb

  # Init script appends a password-protected replication rule so pg_basebackup
  # works from the host through Docker NAT (default pg_hba only allows
  # replication from 127.0.0.1/32, but the Docker bridge presents the host
  # connection as the bridge subnet IP). scram-sha-256 keeps the password
  # requirement intact.
  test-physical-postgres-17:
    build:
      dockerfile_inline: |
        FROM postgres:17
        COPY --chmod=0755 <<"EOF" /docker-entrypoint-initdb.d/02_allow_replication.sh
        #!/bin/bash
        set -e
        echo "host replication all all scram-sha-256" >> "$$PGDATA/pg_hba.conf"
        EOF
    ports:
      - "${TEST_PHYSICAL_POSTGRES_17_PORT:-5007}:5432"
    environment:
      - POSTGRES_DB=testdb
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - summarize_wal=on
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
      - -c
      - wal_keep_size=512MB
    container_name: test-physical-postgres-17
    shm_size: 1gb

  # Replication-capable mTLS cluster: exercises pg_basebackup / pg_receivewal
  # over client-cert TLS. Combines the physical replication flags with ssl=on +
  # a replication-aware pg_hba (see testdata/mtls/pg_hba.conf). Reuses the
  # committed certs (client CN=testuser matches the role).
  test-physical-postgres-17-mtls:
    build:
      context: ./backend/internal/features/tests/physical/testdata/mtls
      dockerfile_inline: |
        FROM postgres:17
        COPY server.key /etc/ssl-test/server.key
        COPY server.crt /etc/ssl-test/server.crt
        COPY ca.crt /etc/ssl-test/ca.crt
        COPY pg_hba.conf /etc/ssl-test/pg_hba.conf
        RUN chown postgres:postgres /etc/ssl-test/server.key /etc/ssl-test/server.crt /etc/ssl-test/ca.crt /etc/ssl-test/pg_hba.conf \
         && chmod 600 /etc/ssl-test/server.key \
         && chmod 644 /etc/ssl-test/server.crt /etc/ssl-test/ca.crt /etc/ssl-test/pg_hba.conf
    ports:
      - "${TEST_PHYSICAL_POSTGRES_17_MTLS_PORT:-5015}:5432"
    environment:
      - POSTGRES_DB=testdb
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
    command: postgres -c ssl=on -c ssl_cert_file=/etc/ssl-test/server.crt -c ssl_key_file=/etc/ssl-test/server.key -c ssl_ca_file=/etc/ssl-test/ca.crt -c hba_file=/etc/ssl-test/pg_hba.conf -c wal_level=logical -c summarize_wal=on -c max_wal_senders=10 -c max_replication_slots=10 -c wal_keep_size=512MB
    container_name: test-physical-postgres-17-mtls
    shm_size: 1gb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  test-physical-postgres-18:
    build:
      dockerfile_inline: |
        FROM postgres:18
        COPY --chmod=0755 <<"EOF" /docker-entrypoint-initdb.d/02_allow_replication.sh
        #!/bin/bash
        set -e
        echo "host replication all all scram-sha-256" >> "$$PGDATA/pg_hba.conf"
        EOF
    ports:
      - "${TEST_PHYSICAL_POSTGRES_18_PORT:-5008}:5432"
    environment:
      - POSTGRES_DB=testdb
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - summarize_wal=on
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
      - -c
      - wal_keep_size=512MB
    container_name: test-physical-postgres-18
    shm_size: 1gb

  # Fail-case containers — explicit default summarize_wal=off so we can test
  # the "BackupType.RequiresWalSummary() ⇒ summarize_wal check fails" path
  # of TestReplicationConnection. One per supported physical PG version
  # because every integration test runs against both 17 and 18.
  test-physical-postgres-17-no-summary:
    build:
      dockerfile_inline: |
        FROM postgres:17
        COPY --chmod=0755 <<"EOF" /docker-entrypoint-initdb.d/02_allow_replication.sh
        #!/bin/bash
        set -e
        echo "host replication all all scram-sha-256" >> "$$PGDATA/pg_hba.conf"
        EOF
    ports:
      - "${TEST_PHYSICAL_POSTGRES_17_NO_SUMMARY_PORT:-5009}:5432"
    environment:
      - POSTGRES_DB=testdb
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
    container_name: test-physical-postgres-17-no-summary
    shm_size: 1gb

  test-physical-postgres-18-no-summary:
    build:
      dockerfile_inline: |
        FROM postgres:18
        COPY --chmod=0755 <<"EOF" /docker-entrypoint-initdb.d/02_allow_replication.sh
        #!/bin/bash
        set -e
        echo "host replication all all scram-sha-256" >> "$$PGDATA/pg_hba.conf"
        EOF
    ports:
      - "${TEST_PHYSICAL_POSTGRES_18_NO_SUMMARY_PORT:-5010}:5432"
    environment:
      - POSTGRES_DB=testdb
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
    container_name: test-physical-postgres-18-no-summary
    shm_size: 1gb

  # Pre-created custom tablespace so the TestReplicationConnection pre-flight
  # rejects the cluster per ADR-0010 (physical backups do not support custom
  # tablespaces). Init script runs once at first container boot.
  test-physical-postgres-17-tablespace:
    build:
      dockerfile_inline: |
        FROM postgres:17
        COPY --chmod=0755 <<"EOF" /docker-entrypoint-initdb.d/01_create_tablespace.sh
        #!/bin/bash
        set -e
        mkdir -p /var/lib/postgresql/custom_tablespace_dir
        psql -v ON_ERROR_STOP=1 --username "$$POSTGRES_USER" --dbname "$$POSTGRES_DB" <<-SQL
          CREATE TABLESPACE custom_ts LOCATION '/var/lib/postgresql/custom_tablespace_dir';
        SQL
        EOF
        COPY --chmod=0755 <<"EOF" /docker-entrypoint-initdb.d/02_allow_replication.sh
        #!/bin/bash
        set -e
        echo "host replication all all scram-sha-256" >> "$$PGDATA/pg_hba.conf"
        EOF
    ports:
      - "${TEST_PHYSICAL_POSTGRES_17_TABLESPACE_PORT:-5011}:5432"
    environment:
      - POSTGRES_DB=testdb
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - summarize_wal=on
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
      - -c
      - wal_keep_size=512MB
    container_name: test-physical-postgres-17-tablespace
    shm_size: 1gb

  test-physical-postgres-18-tablespace:
    build:
      dockerfile_inline: |
        FROM postgres:18
        COPY --chmod=0755 <<"EOF" /docker-entrypoint-initdb.d/01_create_tablespace.sh
        #!/bin/bash
        set -e
        mkdir -p /var/lib/postgresql/custom_tablespace_dir
        psql -v ON_ERROR_STOP=1 --username "$$POSTGRES_USER" --dbname "$$POSTGRES_DB" <<-SQL
          CREATE TABLESPACE custom_ts LOCATION '/var/lib/postgresql/custom_tablespace_dir';
        SQL
        EOF
        COPY --chmod=0755 <<"EOF" /docker-entrypoint-initdb.d/02_allow_replication.sh
        #!/bin/bash
        set -e
        echo "host replication all all scram-sha-256" >> "$$PGDATA/pg_hba.conf"
        EOF
    ports:
      - "${TEST_PHYSICAL_POSTGRES_18_TABLESPACE_PORT:-5012}:5432"
    environment:
      - POSTGRES_DB=testdb
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - summarize_wal=on
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
      - -c
      - wal_keep_size=512MB
    container_name: test-physical-postgres-18-tablespace
    shm_size: 1gb

  # Idle PG 17 image used by the FULL+INCR pg_combinebackup restore test as a
  # restore target. Entrypoint is sleep so PG does not auto-start on an
  # uninitialised PGDATA; the test docker-execs to extract artefacts, run
  # pg_combinebackup and start the cluster on the combined PGDATA. zstd is
  # installed because the postgres image does not ship the CLI tool — the
  # test pipes `zstd -d | tar -x` inside the container to avoid host-side
  # cross-platform tar/symlink trouble.
  test-physical-postgres-17-restore-target:
    build:
      dockerfile_inline: |
        FROM postgres:17
        RUN apt-get update && apt-get install -y --no-install-recommends zstd && rm -rf /var/lib/apt/lists/*
    entrypoint: ["sleep", "infinity"]
    ports:
      - "${TEST_PHYSICAL_POSTGRES_17_RESTORE_TARGET_PORT:-5013}:5432"
    container_name: test-physical-postgres-17-restore-target
    shm_size: 1gb

  # Idle PG 18 restore target for the PG 18 leg of the FULL+INCR
  # pg_combinebackup restore test. PG 18 binaries are required to combine and
  # start a PG 18 backup, and PG 18's pg_verifybackup is the only one that can
  # verify a compressed-tar backup (-F tar), so this container also runs the
  # manifest-correctness gate. zstd is installed for extraction; pg_combinebackup
  # and pg_verifybackup ship with the image.
  test-physical-postgres-18-restore-target:
    build:
      dockerfile_inline: |
        FROM postgres:18
        RUN apt-get update && apt-get install -y --no-install-recommends zstd && rm -rf /var/lib/apt/lists/*
    entrypoint: ["sleep", "infinity"]
    ports:
      - "${TEST_PHYSICAL_POSTGRES_18_RESTORE_TARGET_PORT:-5014}:5432"
    container_name: test-physical-postgres-18-restore-target
    shm_size: 1gb

  # Test Azurite container
  test-azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "${TEST_AZURITE_BLOB_PORT}:10000"
    container_name: test-azurite
    command: azurite-blob --blobHost 0.0.0.0 --skipApiVersionCheck

  # Test Mailpit container (local SMTP sink for tests; accepts any auth)
  test-mailpit:
    image: axllent/mailpit:v1.20.5
    ports:
      - "${TEST_MAILPIT_SMTP_PORT}:1025"
      - "${TEST_MAILPIT_HTTP_PORT}:8025"
    environment:
      - MP_SMTP_AUTH_ACCEPT_ANY=true
      - MP_SMTP_AUTH_ALLOW_INSECURE=true
    container_name: test-mailpit

  # Test NAS server (Samba)
  test-nas:
    image: dperson/samba:latest
    ports:
      - "${TEST_NAS_PORT}:445"
    environment:
      - USERID=1000
      - GROUPID=1000
    volumes:
      - /shared
    command: >
      -u "testuser;testpassword"
      -s "backups;/shared;yes;no;no;testuser"
      -p
    container_name: test-nas

  # Test FTP server
  test-ftp:
    image: stilliard/pure-ftpd:latest
    ports:
      - "${TEST_FTP_PORT}:21"
      - "30000-30009:30000-30009"
    environment:
      - PUBLICHOST=localhost
      - FTP_USER_NAME=testuser
      - FTP_USER_PASS=testpassword
      - FTP_USER_HOME=/home/ftpusers/testuser
      - FTP_PASSIVE_PORTS=30000:30009
    container_name: test-ftp

  # Test SFTP server
  test-sftp:
    image: atmoz/sftp:latest
    ports:
      - "${TEST_SFTP_PORT}:22"
    command: testuser:testpassword:1001::upload
    container_name: test-sftp

  # Test MySQL containers
  test-logical-mysql-57:
    image: mysql:5.7
    ports:
      - "${TEST_LOGICAL_MYSQL_57_PORT}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=testdb
      - MYSQL_USER=testuser
      - MYSQL_PASSWORD=testpassword
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - /var/lib/mysql
    container_name: test-logical-mysql-57
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  test-logical-mysql-80:
    image: mysql:8.0
    ports:
      - "${TEST_LOGICAL_MYSQL_80_PORT}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=testdb
      - MYSQL_USER=testuser
      - MYSQL_PASSWORD=testpassword
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    volumes:
      - /var/lib/mysql
    container_name: test-logical-mysql-80
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  test-logical-mysql-84:
    image: mysql:8.4
    ports:
      - "${TEST_LOGICAL_MYSQL_84_PORT}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=testdb
      - MYSQL_USER=testuser
      - MYSQL_PASSWORD=testpassword
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - /var/lib/mysql
    container_name: test-logical-mysql-84
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  test-logical-mysql-90:
    image: mysql:9.5
    ports:
      - "${TEST_LOGICAL_MYSQL_90_PORT}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=testdb
      - MYSQL_USER=testuser
      - MYSQL_PASSWORD=testpassword
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - /var/lib/mysql
    container_name: test-logical-mysql-90
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Test MariaDB containers
  test-logical-mariadb-55:
    image: mariadb:5.5
    ports:
      - "${TEST_LOGICAL_MARIADB_55_PORT}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=testdb
      - MYSQL_USER=testuser
      - MYSQL_PASSWORD=testpassword
    command: --character-set-server=utf8 --collation-server=utf8_unicode_ci
    volumes:
      - /var/lib/mysql
    container_name: test-logical-mariadb-55
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  test-logical-mariadb-101:
    image: mariadb:10.1
    ports:
      - "${TEST_LOGICAL_MARIADB_101_PORT}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=testdb
      - MYSQL_USER=testuser
      - MYSQL_PASSWORD=testpassword
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - /var/lib/mysql
    container_name: test-logical-mariadb-101
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  test-logical-mariadb-102:
    image: mariadb:10.2
    ports:
      - "${TEST_LOGICAL_MARIADB_102_PORT}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=testdb
      - MYSQL_USER=testuser
      - MYSQL_PASSWORD=testpassword
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - /var/lib/mysql
    container_name: test-logical-mariadb-102
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  test-logical-mariadb-103:
    image: mariadb:10.3
    ports:
      - "${TEST_LOGICAL_MARIADB_103_PORT}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=testdb
      - MYSQL_USER=testuser
      - MYSQL_PASSWORD=testpassword
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - /var/lib/mysql
    container_name: test-logical-mariadb-103
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  test-logical-mariadb-104:
    image: mariadb:10.4
    ports:
      - "${TEST_LOGICAL_MARIADB_104_PORT}:3306"
    environment:
      - MARIADB_ROOT_PASSWORD=rootpassword
      - MARIADB_DATABASE=testdb
      - MARIADB_USER=testuser
      - MARIADB_PASSWORD=testpassword
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - /var/lib/mysql
    container_name: test-logical-mariadb-104
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  test-logical-mariadb-105:
    image: mariadb:10.5
    ports:
      - "${TEST_LOGICAL_MARIADB_105_PORT}:3306"
    environment:
      - MARIADB_ROOT_PASSWORD=rootpassword
      - MARIADB_DATABASE=testdb
      - MARIADB_USER=testuser
      - MARIADB_PASSWORD=testpassword
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - /var/lib/mysql
    container_name: test-logical-mariadb-105
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  test-logical-mariadb-106:
    image: mariadb:10.6
    ports:
      - "${TEST_LOGICAL_MARIADB_106_PORT}:3306"
    environment:
